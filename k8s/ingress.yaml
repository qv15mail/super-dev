apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 构建一个宠物护理预约平台-先做前端
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 构建一个宠物护理预约平台-先做前端.example.com
    secretName: 构建一个宠物护理预约平台-先做前端-tls
  rules:
  - host: 构建一个宠物护理预约平台-先做前端.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: 构建一个宠物护理预约平台-先做前端
            port:
              number: 80
