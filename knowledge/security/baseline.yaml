# 开发：Excellent（11964948@qq.com）

policy: security-baseline
version: "2026.03"
principles:
  - 最小权限
  - 零信任访问
  - 默认拒绝
authentication:
  - 所有敏感接口必须鉴权
  - 令牌需设置过期时间和签名算法白名单
  - 高风险操作要求二次验证
input_output:
  - 输入参数启用白名单校验
  - 敏感字段脱敏后写日志
  - 所有外部URL必须校验域名白名单
audit:
  - 关键操作记录操作人、资源、动作、结果、时间
  - 审计日志需支持按请求ID检索
incident_response:
  - 发现高危漏洞后24小时内完成应急处置
  - 必须有回滚方案与复盘记录
