## 核心能力矩阵

### 角色映射

| 角色 | 核心知识 | 辅助知识 |
|------|----------|----------|
| 平台工程师 | K8s 标准、服务网格、GitOps | 安全、监控、多云 |
| DevOps 工程师 | GitOps、部署清单、自动化 | 容器、监控 |
| 安全工程师 | 容器安全、网络策略、审计 | K8s 标准、反模式 |
| SRE | 扩展、监控、事件响应 | 运维手册、案例 |

### 场景映射

| 场景 | 推荐知识 |
|------|----------|
| 新集群建设 | kubernetes-complete.md、container-security.md |
| 应用容器化 | container-antipatterns.md、k8s-production-readiness-checklist.md |
| 生产部署 | k8s-production-readiness-checklist.md、container-security-checklist.md |
| 流量管理 | service-mesh-playbook.md |
| 持续部署 | gitops-with-argocd.md |
| 弹性扩展 | case-k8s-scaling.md |
| 安全加固 | container-security.md、case-k8s-security-incident.md |
| 多云部署 | multicloud-governance.md |

