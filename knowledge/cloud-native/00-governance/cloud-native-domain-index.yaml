- [x] 无 emoji 使用

## 使用指南

### 快速开始

1. **新用户**：从词汇表开始，理解核心概念
2. **实践者**：参考标准和检查清单
3. **故障排查**：查看反模式和案例

### 学习路径

**入门路径（30 天）**：
1. Week 1：kubernetes-complete.md + 词汇表
2. Week 2：container-security.md + 检查清单
3. Week 3：服务网格 + GitOps
4. Week 4：案例学习

**进阶路径（60 天）**：
1. Week 1-2：深入 K8s 标准和安全
2. Week 3-4：服务网格和 GitOps 实践
3. Week 5-6：Serverless 和多云
4. Week 7-8：案例复盘和实战

### 检索关键词

**高频关键词**：
- Kubernetes、K8s、容器、Docker
- 服务网格、Istio、流量管理、mTLS
- GitOps、ArgoCD、持续部署
- Serverless、Knative、函数计算
- 安全、RBAC、NetworkPolicy、审计
- 扩展、HPA、VPA、Cluster Autoscaler
- 监控、Prometheus、日志、追踪

## 维护计划

### 更新频率

| 类型 | 频率 | 责任人 |
|------|------|--------|
| 标准文档 | 季度 | 平台团队 |
| 作战手册 | 月度 | 平台团队 |
| 检查清单 | 月度 | 安全团队 |
| 反模式 | 季度 | 全体 |
| 案例 | 按需 | 全体 |

### 审核流程

1. **技术审核**：技术准确性
2. **实践验证**：可操作性验证
3. **安全审核**：安全合规性
4. **最终发布**：版本控制

## 相关领域

- **开发**：应用容器化、微服务开发
- **安全**：云安全、零信任架构
- **运维**：SRE、可观测性
- **架构**：分布式系统、高可用设计

