# Super Dev 默认验证规则
# 规则引擎在每个阶段自动加载并执行匹配的规则
# 用户可通过 .super-dev/rules/custom_rules.yaml 覆盖或扩展

rules:
  # ─────────────────────────────────────────────
  # 文档阶段规则
  # ─────────────────────────────────────────────

  - id: DOC-001
    name: PRD 完整性检查
    category: documentation
    severity: critical
    phase: docs
    description: PRD 必须包含目标用户、核心功能、成功指标
    check_type: content_contains
    check_config:
      file_pattern: "output/*-prd.md"
      required_sections:
        - "目标用户"
        - "核心功能"
        - "成功指标"
        - "非功能需求"

  - id: DOC-002
    name: 架构文档完整性检查
    category: documentation
    severity: critical
    phase: docs
    description: 架构文档必须包含技术选型、部署架构、数据模型
    check_type: content_contains
    check_config:
      file_pattern: "output/*-architecture.md"
      required_sections:
        - "技术选型"
        - "部署"
        - "数据"

  - id: DOC-003
    name: UIUX 文档完整性检查
    category: documentation
    severity: high
    phase: docs
    description: UIUX 文档必须包含设计令牌、页面层级、组件状态
    check_type: content_contains
    check_config:
      file_pattern: "output/*-uiux.md"
      required_sections:
        - "设计"
        - "页面"
        - "组件"

  # ─────────────────────────────────────────────
  # 安全规则（全阶段）
  # ─────────────────────────────────────────────

  - id: SEC-001
    name: 禁止硬编码密钥
    category: security
    severity: critical
    phase: all
    description: 代码中不得包含硬编码的密码、API 密钥或密钥字符串
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "password\\s*=\\s*['\"]"
        - "api_key\\s*=\\s*['\"]"
        - "secret\\s*=\\s*['\"]"
    tags:
      - owasp-top10
      - credentials

  - id: SEC-002
    name: SQL 注入防护
    category: security
    severity: critical
    phase: backend
    description: 禁止使用字符串拼接构造 SQL 查询
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "f['\"].*SELECT.*{"
        - "format.*SELECT"
        - "\\.execute\\(.*%s.*%"
    tags:
      - owasp-top10
      - sql-injection

  - id: SEC-003
    name: 禁止 eval/exec 使用
    category: security
    severity: high
    phase: all
    description: 禁止在生产代码中使用 eval() 或 exec()
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "\\beval\\s*\\("
        - "\\bexec\\s*\\("
    tags:
      - code-injection

  # ─────────────────────────────────────────────
  # 性能规则
  # ─────────────────────────────────────────────

  - id: PERF-001
    name: 前端包体积限制
    category: performance
    severity: high
    phase: frontend
    description: 前端构建产物不应超过 500KB
    check_type: metric_threshold
    check_config:
      metric: bundle_size_kb
      max_value: 500

  - id: PERF-002
    name: 依赖数量限制
    category: performance
    severity: medium
    phase: frontend
    description: 前端直接依赖不应超过 30 个
    check_type: metric_threshold
    check_config:
      metric: dependency_count
      max_value: 30

  # ─────────────────────────────────────────────
  # 测试规则
  # ─────────────────────────────────────────────

  - id: TEST-001
    name: 测试覆盖率门禁
    category: testing
    severity: high
    phase: quality
    description: 测试覆盖率不低于 80%
    check_type: metric_threshold
    check_config:
      metric: test_coverage_percent
      min_value: 80

  - id: TEST-002
    name: 单元测试文件存在
    category: testing
    severity: high
    phase: quality
    description: 每个核心模块应有对应的单元测试文件
    check_type: file_exists
    check_config:
      file_pattern: "tests/unit/test_*.py"
      min_count: 1

  # ─────────────────────────────────────────────
  # 架构规则
  # ─────────────────────────────────────────────

  - id: ARCH-001
    name: API 版本控制
    category: architecture
    severity: medium
    phase: backend
    description: API 路由应包含版本号（如 /api/v1/）
    check_type: regex_match
    check_config:
      file_pattern: "**/*.py"
      pattern: "/api/v[0-9]+"
      description: "API 路由应包含版本号"

  - id: ARCH-002
    name: 配置文件存在
    category: architecture
    severity: medium
    phase: all
    description: 项目根目录应存在 super-dev.yaml 配置文件
    check_type: file_exists
    check_config:
      file_pattern: "super-dev.yaml"
      min_count: 1

  # ─────────────────────────────────────────────
  # 代码质量规则
  # ─────────────────────────────────────────────

  - id: CQ-001
    name: TODO/FIXME 清理
    category: code_quality
    severity: low
    phase: delivery
    description: 交付代码中不应残留 TODO 或 FIXME 注释
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "# TODO"
        - "# FIXME"
        - "# HACK"
    tags:
      - cleanup

  - id: CQ-002
    name: 类型提示覆盖
    category: code_quality
    severity: medium
    phase: quality
    description: 公共函数应具有类型提示
    check_type: regex_match
    check_config:
      file_pattern: "super_dev/**/*.py"
      pattern: "def \\w+\\(.*\\)\\s*->"
      description: "公共函数应包含返回值类型提示"
