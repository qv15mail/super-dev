# Super Dev 代码质量增强规则
# 覆盖 console.log 残留、硬编码URL、未使用import、敏感信息泄露等

rules:
  # ─────────────────────────────────────────────
  # 前端代码质量
  # ─────────────────────────────────────────────

  - id: CQ-FE-001
    name: console.log 残留检查
    category: code_quality
    severity: medium
    phase: quality
    description: 交付代码中不应残留 console.log/console.error/console.warn 调试语句
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.{ts,tsx,js,jsx,vue,svelte}"
      patterns:
        - "console\\.log\\("
        - "console\\.debug\\("
        - "console\\.warn\\("
        - "console\\.error\\("
    tags:
      - frontend
      - cleanup

  - id: CQ-FE-002
    name: 硬编码颜色值检查
    category: code_quality
    severity: high
    phase: frontend
    description: 前端代码中不应出现硬编码的 hex/rgb 颜色值，应使用 design token
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.{tsx,jsx,vue,svelte,css,scss}"
      patterns:
        - "#[0-9a-fA-F]{6}"
        - "rgb\\([0-9]+"
        - "rgba\\([0-9]+"
    tags:
      - design-token
      - consistency

  - id: CQ-FE-003
    name: 硬编码 URL 检查
    category: code_quality
    severity: high
    phase: frontend
    description: 前端代码中不应硬编码后端 API 地址，应使用环境变量或统一配置
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.{ts,tsx,js,jsx}"
      patterns:
        - "http://localhost:[0-9]+"
        - "https?://[a-z]+\\.com/api"
        - "fetch\\(['\"]http"
    tags:
      - config
      - consistency

  - id: CQ-FE-004
    name: 图片 alt 属性检查
    category: code_quality
    severity: medium
    phase: frontend
    description: img 标签必须包含 alt 属性以满足无障碍要求
    check_type: regex_match
    check_config:
      file_pattern: "**/*.{tsx,jsx,vue,svelte}"
      pattern: "<img[^>]*(?!alt=)[^>]*/?>"
      description: "img 标签缺少 alt 属性"
    tags:
      - a11y

  - id: CQ-FE-005
    name: localhost 残留检查
    category: code_quality
    severity: critical
    phase: delivery
    description: 交付代码中不应残留 localhost 引用
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.{ts,tsx,js,jsx,py,yaml,yml,json,env}"
      patterns:
        - "http://localhost:"
        - "http://127\\.0\\.0\\.1:"
    tags:
      - delivery
      - production

  - id: CQ-FE-006
    name: 内联样式滥用检查
    category: code_quality
    severity: low
    phase: frontend
    description: 避免大量使用内联 style 属性，应使用 class/CSS module/design token
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.{tsx,jsx}"
      patterns:
        - "style=\\{\\{[^}]{100,}"
    tags:
      - style

  # ─────────────────────────────────────────────
  # 后端代码质量
  # ─────────────────────────────────────────────

  - id: CQ-BE-001
    name: 敏感信息日志打印
    category: security
    severity: critical
    phase: all
    description: 日志中不应打印密码、token、密钥等敏感信息
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "log.*password"
        - "log.*secret"
        - "log.*token"
        - "logger.*password"
        - "logger.*secret"
        - "print.*password"
        - "print.*secret"
        - "print.*api_key"
    tags:
      - security
      - logging

  - id: CQ-BE-002
    name: 异常吞没检查
    category: code_quality
    severity: high
    phase: backend
    description: 不应存在空的 except 块或 pass 的异常处理
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "except.*:\\s*\\n\\s*pass"
        - "except:\\s*\\n\\s*pass"
    tags:
      - error-handling

  - id: CQ-BE-003
    name: CORS 配置检查
    category: security
    severity: high
    phase: backend
    description: CORS 配置不应使用通配符 *
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "allow_origins.*\\*"
        - "CORSMiddleware.*\\*"
        - "Access-Control-Allow-Origin.*\\*"
    tags:
      - security
      - cors

  - id: CQ-BE-004
    name: 调试模式关闭检查
    category: security
    severity: critical
    phase: delivery
    description: 生产环境必须关闭调试模式
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.{py,yaml,yml,env}"
      patterns:
        - "DEBUG\\s*=\\s*True"
        - "debug:\\s*true"
        - "debug=True"
    tags:
      - security
      - production

  - id: CQ-BE-005
    name: 环境变量敏感默认值检查
    category: security
    severity: high
    phase: all
    description: 环境变量获取时不应有硬编码的敏感默认值
    check_type: content_not_contains
    check_config:
      file_pattern: "**/*.py"
      patterns:
        - "os\\.environ\\.get.*['\"]sk-"
        - "os\\.environ\\.get.*['\"]password"
        - "os\\.environ\\.get.*['\"]secret"
        - "os\\.getenv.*['\"]sk-"
    tags:
      - security
      - config

  # ─────────────────────────────────────────────
  # 文档内容深度检查
  # ─────────────────────────────────────────────

  - id: DOC-DEEP-001
    name: PRD 验收标准检查
    category: documentation
    severity: high
    phase: docs
    description: PRD 必须包含具体的验收标准，不能只有功能描述
    check_type: content_contains
    check_config:
      file_pattern: "output/*-prd.md"
      required_sections:
        - "验收"
        - "成功指标"
    tags:
      - prd
      - quality

  - id: DOC-DEEP-002
    name: 架构文档 trade-off 检查
    category: documentation
    severity: medium
    phase: docs
    description: 架构文档技术选型应包含选型理由和 trade-off 分析
    check_type: content_contains
    check_config:
      file_pattern: "output/*-architecture.md"
      required_sections:
        - "选型"
    tags:
      - architecture

  - id: DOC-DEEP-003
    name: UIUX 响应式策略检查
    category: documentation
    severity: medium
    phase: docs
    description: UIUX 文档应包含响应式断点和移动端适配方案
    check_type: content_contains
    check_config:
      file_pattern: "output/*-uiux.md"
      required_sections:
        - "响应"
    tags:
      - uiux

  - id: DOC-DEEP-004
    name: UIUX 暗色模式检查
    category: documentation
    severity: low
    phase: docs
    description: UIUX 文档应包含暗色模式方案
    check_type: content_contains
    check_config:
      file_pattern: "output/*-uiux.md"
      required_sections:
        - "暗色"
        - "dark"
    tags:
      - uiux

  # ─────────────────────────────────────────────
  # Spec-Code 追踪规则
  # ─────────────────────────────────────────────

  - id: SPEC-001
    name: Spec 文件存在检查
    category: documentation
    severity: high
    phase: spec
    description: Spec 目录下应存在至少一个变更提案
    check_type: file_exists
    check_config:
      file_pattern: ".super-dev/changes/*/tasks.md"
      min_count: 1
    tags:
      - spec

  - id: SPEC-002
    name: API 契约一致性
    category: architecture
    severity: high
    phase: backend
    description: 前端 fetch URL 应与架构文档定义的 API 路径一致
    check_type: regex_match
    check_config:
      file_pattern: "**/*.{ts,tsx,js,jsx}"
      pattern: "/api/[a-z_/]+"
      description: "前端 API 路径应在架构文档中有定义"
    tags:
      - consistency
      - api

  # ─────────────────────────────────────────────
  # 交付完整性规则
  # ─────────────────────────────────────────────

  - id: DELIVER-001
    name: .env.example 存在检查
    category: architecture
    severity: medium
    phase: delivery
    description: 项目应包含 .env.example 文件说明所需环境变量
    check_type: file_exists
    check_config:
      file_pattern: ".env.example"
      min_count: 1
    tags:
      - delivery

  - id: DELIVER-002
    name: README 存在检查
    category: documentation
    severity: medium
    phase: delivery
    description: 项目应包含 README 文件
    check_type: file_exists
    check_config:
      file_pattern: "README.md"
      min_count: 1
    tags:
      - delivery
