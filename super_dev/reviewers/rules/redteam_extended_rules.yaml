# Super Dev 红队增强规则
# 更深入的安全/性能/架构风险检测
# 补充 OWASP Top 10 覆盖、量化性能指标、架构反模式

redteam_rules:
  # ─────────────────────────────────────────────
  # OWASP Top 10 补充规则
  # ─────────────────────────────────────────────

  - id: RT-SEC-006
    name: CSRF 防护检查
    severity: high
    category: security
    description: POST/PUT/DELETE 请求应有 CSRF token 验证
    recommendation: 启用 CSRF middleware，对状态变更操作验证 CSRF token
    cwe: CWE-352
    patterns:
      - "csrf_exempt"
      - "CsrfViewMiddleware"
      - "@csrf"

  - id: RT-SEC-007
    name: 不安全的反序列化
    severity: critical
    category: security
    description: 检查是否使用了不安全的反序列化方法
    recommendation: 使用 JSON 替代 pickle，对输入数据进行类型校验
    cwe: CWE-502
    patterns:
      - "pickle\\.loads\\("
      - "yaml\\.load\\(.*Loader"
      - "marshal\\.loads\\("

  - id: RT-SEC-008
    name: SSRF 风险检测
    severity: high
    category: security
    description: 检查是否有用户可控的 URL 请求（服务端请求伪造）
    recommendation: 验证目标 URL 白名单，禁止请求内网地址
    cwe: CWE-918
    patterns:
      - "requests\\.get\\(.*request"
      - "urllib\\.request\\.urlopen\\(.*request"
      - "httpx\\.get\\(.*request"

  - id: RT-SEC-009
    name: 弱加密算法检查
    severity: high
    category: security
    description: 不应使用 MD5/SHA1/DES 等弱加密算法
    recommendation: 使用 SHA-256+ 或 bcrypt/argon2 进行哈希，AES-256 进行加密
    cwe: CWE-328
    patterns:
      - "hashlib\\.md5\\("
      - "hashlib\\.sha1\\("
      - "DES\\.new\\("
      - "from Crypto\\.Cipher import DES"

  - id: RT-SEC-010
    name: 未验证的 SSL/TLS
    severity: high
    category: security
    description: HTTP 请求不应禁用 SSL 证书验证
    recommendation: 保持 SSL 证书验证开启，或使用自定义 CA bundle
    cwe: CWE-295
    patterns:
      - "verify=False"
      - "ssl\\._create_unverified_context"

  - id: RT-SEC-011
    name: 文件上传类型检查
    severity: high
    category: security
    description: 文件上传应限制允许的文件类型和大小
    recommendation: 验证文件 MIME type 和扩展名白名单，限制文件大小
    cwe: CWE-434
    patterns:
      - "FileField\\(.*upload_to"
      - "save_uploaded_file\\("
      - "\\.save\\(.*upload"

  - id: RT-SEC-012
    name: JWT 安全配置
    severity: high
    category: security
    description: JWT 不应使用 none 算法或硬编码密钥
    recommendation: 使用 RS256/HS256 算法，密钥从环境变量读取
    cwe: CWE-327
    patterns:
      - "algorithm.*none"
      - "algorithms.*\\[.*none"
      - "JWT_SECRET.*=.*['\"]"

  # ─────────────────────────────────────────────
  # 性能增强规则
  # ─────────────────────────────────────────────

  - id: RT-PERF-004
    name: 缺少数据库索引风险
    severity: medium
    category: performance
    description: 查询条件字段应有索引支持
    recommendation: 为常用查询条件和排序字段添加数据库索引
    patterns:
      - "\\.filter\\("
      - "\\.where\\("
      - "WHERE.*=.*\\$"
      - "db\\.collection\\.find\\("

  - id: RT-PERF-005
    name: 缺少缓存策略
    severity: medium
    category: performance
    description: 频繁读取的数据应有缓存层
    recommendation: 对热点数据使用 Redis/Memcached 缓存，设置合理 TTL
    patterns:
      - "\\.all\\(\\).*for"
      - "\\.filter\\(\\).*for"
      - "get_by_id\\(\\)"

  - id: RT-PERF-006
    name: 大列表无分页
    severity: high
    category: performance
    description: 列表查询应有分页机制，避免一次加载全部数据
    recommendation: 使用 offset/limit 或 cursor 分页，默认每页 20-50 条
    patterns:
      - "\\.all\\(\\)\\s*\\]"
      - "Model\\.objects\\.all\\(\\)"
      - "find\\(\\{\\}\\)\\.toArray"

  - id: RT-PERF-007
    name: 前端重渲染风险
    severity: medium
    category: performance
    description: React 组件应有适当的 memo/useMemo/useCallback 优化
    recommendation: 对昂贵计算使用 useMemo，对回调函数使用 useCallback
    patterns:
      - "useEffect\\(.*\\[\\]"
      - "\\.map\\(.*=>.*<"

  - id: RT-PERF-008
    name: 图片资源优化检查
    severity: medium
    category: performance
    description: 图片应使用懒加载和现代格式（WebP/AVIF）
    recommendation: 使用 loading=\"lazy\"，提供 WebP/AVIF 格式替代，设置 width/height
    patterns:
      - "<img[^>]*(?!loading)"
      - "\\.jpg\""
      - "\\.png\""

  # ─────────────────────────────────────────────
  # 架构反模式
  # ─────────────────────────────────────────────

  - id: RT-ARCH-004
    name: 紧耦合数据库查询
    severity: medium
    category: architecture
    description: 业务逻辑不应直接包含 SQL 查询字符串
    recommendation: 使用 Repository 模式或 ORM 封装数据访问
    patterns:
      - "SELECT.*FROM.*WHERE"
      - "INSERT INTO"
      - "UPDATE.*SET"

  - id: RT-ARCH-005
    name: 硬编码业务规则
    severity: low
    category: architecture
    description: 业务规则不应硬编码在代码中，应可配置
    recommendation: 将业务规则提取到配置文件或规则引擎中
    patterns:
      - "if.*>\\s*\\d{4,}"
      - "if.*<\\s*\\d{4,}"
      - "DISCOUNT_RATE\\s*=\\s*[0-9]"
      - "MAX_RETRY\\s*=\\s*[0-9]{2,}"

  - id: RT-ARCH-006
    name: 缺少错误边界（前端）
    severity: medium
    category: architecture
    description: React 应用应有 Error Boundary 组件防止整个应用崩溃
    recommendation: 在关键层级添加 Error Boundary，展示友好错误页面
    patterns:
      - "ReactDOM\\.createRoot"
      - "createRoot\\("

  - id: RT-ARCH-007
    name: 环境混用风险
    severity: high
    category: architecture
    description: 不应在同一文件中混用开发和生产配置
    recommendation: 使用环境变量区分，通过配置中心管理不同环境
    patterns:
      - "localhost.*production"
      - "development.*prod"
      - "staging.*localhost"
