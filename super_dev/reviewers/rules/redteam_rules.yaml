# Super Dev 红队审查声明式规则
# 基于模式匹配的静态安全/性能/架构风险检测
# 规则引擎在红队审查阶段自动加载并扫描目标代码

redteam_rules:
  # ─────────────────────────────────────────────
  # 安全规则 (RT-SEC-*)
  # ─────────────────────────────────────────────

  - id: RT-SEC-001
    name: Prompt 注入风险检测
    severity: critical
    category: security
    description: 检查代码是否有直接将用户输入拼接到 Prompt 的风险
    recommendation: 使用参数化 Prompt 模板，对用户输入进行过滤和转义
    cwe: CWE-77
    patterns:
      - 'f".*\{user_input\}.*"'
      - 'f".*\{request\..*\}.*"'
      - '\.format\(.*user.*\)'

  - id: RT-SEC-002
    name: 密钥泄漏检测
    severity: critical
    category: security
    description: 检查代码中是否硬编码了 API 密钥或凭证
    recommendation: 使用环境变量或密钥管理服务存储敏感凭证
    cwe: CWE-798
    patterns:
      - 'sk-[a-zA-Z0-9]{32,}'
      - 'AKIA[A-Z0-9]{16}'
      - 'ghp_[a-zA-Z0-9]{36}'
      - 'password\s*=\s*["\x27][^"\x27]{4,}["\x27]'

  - id: RT-SEC-003
    name: SQL 注入风险
    severity: critical
    category: security
    description: 检查代码中是否存在 SQL 注入风险（字符串拼接 SQL）
    recommendation: 使用参数化查询或 ORM，禁止字符串拼接构造 SQL
    cwe: CWE-89
    patterns:
      - 'execute\(.*f"'
      - 'execute\(.*\.format'
      - 'raw\(.*f"'
      - 'cursor\.execute\(.*%s.*%'

  - id: RT-SEC-004
    name: XSS 风险检测
    severity: high
    category: security
    description: 检查是否有未转义的用户输入直接插入 HTML
    recommendation: 使用模板引擎的自动转义功能，对用户输入进行 HTML 编码
    cwe: CWE-79
    patterns:
      - 'innerHTML\s*='
      - 'dangerouslySetInnerHTML'
      - 'document\.write\('
      - 'v-html\s*='

  - id: RT-SEC-005
    name: 路径遍历风险
    severity: high
    category: security
    description: 检查是否有未验证的路径拼接操作
    recommendation: 使用 Path.resolve() 并验证路径不超出预期目录
    cwe: CWE-22
    patterns:
      - 'open\(.*\+.*\)'
      - 'os\.path\.join\(.*request'
      - 'Path\(.*request'

  # ─────────────────────────────────────────────
  # 性能规则 (RT-PERF-*)
  # ─────────────────────────────────────────────

  - id: RT-PERF-001
    name: N+1 查询风险
    severity: high
    category: performance
    description: 检查是否存在循环内逐条查询数据库的模式
    recommendation: 使用 select_related/prefetch_related 或批量查询替代循环查询
    patterns:
      - 'for .* in .*\.all\(\)'
      - 'for .* in .*\.objects\.'
      - 'for .* in .*\.query\('

  - id: RT-PERF-002
    name: 同步阻塞调用
    severity: medium
    category: performance
    description: 检查异步代码中是否存在同步阻塞调用
    recommendation: 使用异步替代方案（aiohttp, asyncpg 等），或使用 run_in_executor
    patterns:
      - 'requests\.get\('
      - 'requests\.post\('
      - 'time\.sleep\('
      - 'urllib\.request'

  - id: RT-PERF-003
    name: 无限制查询
    severity: high
    category: performance
    description: 检查是否有不带 LIMIT 的全表查询
    recommendation: 添加分页或 LIMIT 限制，避免大数据量场景下的内存溢出
    patterns:
      - '\.all\(\)\s*$'
      - 'SELECT \* FROM'
      - 'find\(\{\}\)'

  # ─────────────────────────────────────────────
  # 架构规则 (RT-ARCH-*)
  # ─────────────────────────────────────────────

  - id: RT-ARCH-001
    name: 循环依赖风险
    severity: medium
    category: architecture
    description: 检查模块间是否存在循环导入
    recommendation: 重构模块依赖关系，使用依赖注入或延迟导入
    patterns:
      - 'from \.\. import'
      - 'importlib\.import_module'

  - id: RT-ARCH-002
    name: 硬编码配置
    severity: medium
    category: architecture
    description: 检查是否有硬编码的主机名、端口、URL 等配置
    recommendation: 将配置项提取到配置文件或环境变量中
    patterns:
      - 'localhost:\d+'
      - '127\.0\.0\.1:\d+'
      - 'http://[a-z]+:\d+'

  - id: RT-ARCH-003
    name: 上帝类风险
    severity: medium
    category: architecture
    description: 文件超过 500 行可能表明职责过重
    recommendation: 按职责拆分为多个模块，遵循单一职责原则
    check_type: file_line_count
    check_config:
      max_lines: 500
