# Azure Pipelines CI/CD for super-dev
trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'super-dev'
  dockerRegistry: 'your-registry.azurecr.io'
  NODE_VERSION: '18'

stages:
  # ========== Build and Test ==========
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build Job'
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          - script: |
              if [ -f frontend/package.json ]; then
                npm --prefix frontend ci
              fi
              if [ -f backend/package.json ]; then
                npm --prefix backend ci
              fi
              if [ -f requirements.txt ] || [ -f backend/requirements.txt ] || [ -f pyproject.toml ]; then
                python -m pip install -e ".[dev]"
              fi
            displayName: 'Install dependencies'

          - script: |
              if [ -f frontend/package.json ]; then
                npm --prefix frontend run lint --if-present
                npm --prefix frontend run type-check --if-present
              fi
              if [ -f backend/package.json ]; then
                npm --prefix backend run lint --if-present
              fi
              if [ -d super_dev ]; then
                ruff check super_dev tests
                mypy super_dev
              fi
            displayName: 'Run quality checks'

          - script: |
              if [ -f frontend/package.json ]; then
                npm --prefix frontend run test --if-present
              fi
              if [ -f backend/package.json ]; then
                npm --prefix backend run test --if-present
              fi
              if [ -d tests ]; then
                pytest -q
              fi
            displayName: 'Run tests'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml'
            displayName: 'Publish coverage'

          - task: PublishTestResults@2
            inputs:
              testResultsFiles: '**/junit.xml'
              testRunTitle: 'Test Results'
            displayName: 'Publish test results'

          - script: |
              docker build -t $(dockerRegistry)/$(imageName):$(Build.BuildId) .
              docker tag $(dockerRegistry)/$(imageName):$(Build.BuildId) $(dockerRegistry)/$(imageName):latest
            displayName: 'Build Docker image'

          - task: Docker@2
            displayName: 'Push to ACR'
            inputs:
              command: push
              repository: $(imageName)
              dockerfile: Dockerfile
              containerRegistry: 'your-acr-service-connection'
              tags: |
                $(Build.BuildId)
                latest

  # ========== Deploy to Dev ==========
  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDev
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: KubernetesManifest@0
                  displayName: 'Deploy to Dev'
                  inputs:
                    action: 'deploy'
                    kubernetesServiceConnection: 'dev-k8s-connection'
                    manifests: |
                      k8s/deployment.yaml
                      k8s/service.yaml
                    containers: |
                      $(imageName):$(Build.BuildId)

  # ========== Deploy to Prod ==========
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: KubernetesManifest@0
                  displayName: 'Deploy to Production'
                  inputs:
                    action: 'deploy'
                    kubernetesServiceConnection: 'prod-k8s-connection'
                    manifests: |
                      k8s/deployment.yaml
                      k8s/service.yaml
                      k8s/ingress.yaml
                    containers: |
                      $(imageName):$(Build.BuildId)
