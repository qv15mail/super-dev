# Bitbucket Pipelines CI/CD for super-dev
image: node:18

definitions:
  services:
    postgres:
      image: postgres:15
      variables:
        POSTGRES_DB: test_db
        POSTGRES_PASSWORD: postgres
    redis:
      image: redis:7

  caches:
    node_frontend: frontend/node_modules
    node_backend: backend/node_modules

pipelines:
  branches:
    main:
      - step:
          name: 'Build and Test'
          caches:
            - node_frontend
            - node_backend
          services:
            - postgres
            - redis
          script:
            - if [ -f frontend/package.json ]; then npm --prefix frontend ci; fi
            - if [ -f backend/package.json ]; then npm --prefix backend ci; fi
            - if [ -f frontend/package.json ]; then npm --prefix frontend run lint --if-present; npm --prefix frontend run type-check --if-present; fi
            - if [ -f backend/package.json ]; then npm --prefix backend run lint --if-present; fi
            - if [ -f frontend/package.json ]; then npm --prefix frontend run test --if-present; fi
            - if [ -f backend/package.json ]; then npm --prefix backend run test --if-present; fi
          after-script:
            - pipe: atlassian/code-insights:0.5.0
              variables:
                REPORT_TYPE: 'coverage'
                FORMAT: 'cobertura'
                FILE: 'coverage/cobertura-coverage.xml'

      - step:
          name: 'Build Docker Image'
          script:
            - docker build -t ${REGISTRY_URL}/super-dev:${BITBUCKET_BUILD_NUMBER} .
            - docker push ${REGISTRY_URL}/super-dev:${BITBUCKET_BUILD_NUMBER}
          services:
            - docker

      - step:
          name: 'Deploy to Production'
          deployment: production
          script:
            - pipe: atlassian/kubectl-deploy:1.7.0
              variables:
                KUBE_CONFIG: ${KUBE_CONFIG_PROD}
                KUBECTL_VERSION: '1.28.0'
                RESOURCE_PATH: 'k8s/'
                SELECTOR: 'app=super-dev'
                CONTAINER: 'super-dev'
                IMAGE: ${REGISTRY_URL}/super-dev:${BITBUCKET_BUILD_NUMBER}

    develop:
      - step:
          name: 'Build and Test'
          caches:
            - node_frontend
            - node_backend
          services:
            - postgres
            - redis
          script:
            - if [ -f frontend/package.json ]; then npm --prefix frontend ci; fi
            - if [ -f backend/package.json ]; then npm --prefix backend ci; fi
            - if [ -f frontend/package.json ]; then npm --prefix frontend run lint --if-present; npm --prefix frontend run type-check --if-present; fi
            - if [ -f backend/package.json ]; then npm --prefix backend run lint --if-present; fi
            - if [ -f frontend/package.json ]; then npm --prefix frontend run test --if-present; fi
            - if [ -f backend/package.json ]; then npm --prefix backend run test --if-present; fi

      - step:
          name: 'Build Docker Image'
          script:
            - docker build -t ${REGISTRY_URL}/super-dev:${BITBUCKET_BUILD_NUMBER} .
            - docker push ${REGISTRY_URL}/super-dev:${BITBUCKET_BUILD_NUMBER}
          services:
            - docker

      - step:
          name: 'Deploy to Dev'
          deployment: development
          script:
            - pipe: atlassian/kubectl-deploy:1.7.0
              variables:
                KUBE_CONFIG: ${KUBE_CONFIG_DEV}
                KUBECTL_VERSION: '1.28.0'
                RESOURCE_PATH: 'k8s/'
                SELECTOR: 'app=super-dev'
                CONTAINER: 'super-dev'
                IMAGE: ${REGISTRY_URL}/super-dev:${BITBUCKET_BUILD_NUMBER}

  pull-requests:
    - step:
        name: 'PR Build and Test'
        caches:
          - node_frontend
          - node_backend
        services:
          - postgres
          - redis
        script:
          - if [ -f frontend/package.json ]; then npm --prefix frontend ci; fi
          - if [ -f backend/package.json ]; then npm --prefix backend ci; fi
          - if [ -f frontend/package.json ]; then npm --prefix frontend run lint --if-present; npm --prefix frontend run type-check --if-present; fi
          - if [ -f backend/package.json ]; then npm --prefix backend run lint --if-present; fi
          - if [ -f frontend/package.json ]; then npm --prefix frontend run test --if-present; fi
          - if [ -f backend/package.json ]; then npm --prefix backend run test --if-present; fi
        after-script:
          - pipe: atlassian/code-insights:0.5.0
            variables:
              REPORT_TYPE: 'coverage'
              FORMAT: 'cobertura'
              FILE: 'coverage/cobertura-coverage.xml'
