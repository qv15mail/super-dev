name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to validate (for manual dry-run metadata)"
        required: false
        default: ""

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit build twine

      - name: Run Preflight
        run: bash scripts/preflight.sh

      - name: Upload Preflight Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report
          path: output/release/**
          if-no-files-found: warn

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-readiness]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Distribution
        run: |
          rm -rf dist/ build/ *.egg-info
          python -m build
          twine check dist/*

      - name: Enforce PyPI Token
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "::error::PYPI_API_TOKEN is required for tag release publishing."
            exit 1
          fi

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
