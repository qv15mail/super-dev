name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-compat:
    name: Platform Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run compatibility tests
        run: |
          pytest -q \
            tests/unit/test_integration_manager.py \
            tests/unit/test_skill_manager.py \
            tests/integration/test_cli.py \
            -k "integrate_setup_each_target or skill_builtin_install_each_target or test_setup_all_targets or test_install_builtin_skill"

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit build twine

      - name: Lint
        run: ruff check super_dev tests scripts/check_delivery_ready.py scripts/check_host_compatibility.py --output-format concise

      - name: Type Check
        run: mypy super_dev

      - name: Unit/Integration Tests
        run: pytest -q

      - name: Delivery Gate Smoke
        run: python scripts/check_delivery_ready.py --smoke --project-dir .

      - name: Generate Host Compatibility Report
        run: |
          python -m super_dev.cli setup --host codex-cli --force --skip-doctor
          python -m super_dev.cli detect --host codex-cli --json > /tmp/host-compat.json

      - name: Host Compatibility Gate
        run: python scripts/check_host_compatibility.py --project-dir . --min-score 80 --min-ready-hosts 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install bandit pip-audit

      - name: Bandit
        run: python -m bandit -ll -r super_dev -f json -o bandit-results.json

      - name: Pip Audit
        run: python -m pip_audit . -f json -o pip-audit-results.json

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-results.json
            pip-audit-results.json
          if-no-files-found: error

  package:
    name: Package Check
    runs-on: ubuntu-latest
    needs: [quality, platform-compat]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Distribution
        run: |
          rm -rf dist/ build/ *.egg-info
          python -m build

      - name: Twine Check
        run: twine check dist/*

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error
