author: ''
backend: node
cli: {}
database: postgresql
description: Super Dev 是一个本地 Python CLI 与宿主规则协同的 AI Coding 治理工具，用 research-first 流水线约束文档冻结、Spec 拆解、前端优先验证、质量门禁和交付证据闭环。
domain: ''
experts:
- PM
- ARCHITECT
- UI
- UX
- SECURITY
- CODE
frontend: react
host_compatibility_min_ready_hosts: 1
host_compatibility_min_score: 80
host_profile_enforce_selected: true
host_profile_targets:
- claude-code
knowledge_allowed_domains:
- openai.com
- python.org
- developer.mozilla.org
- w3.org
- nodejs.org
- fastapi.tiangolo.com
- docs.pydantic.dev
- docs.pytest.org
- mypy.readthedocs.io
- docs.astral.sh
- docs.github.com
- docs.docker.com
- cheatsheetseries.owasp.org
- owasp.org
- csrc.nist.gov
- nist.gov
- docs.anthropic.com
- docs.vllm.ai
knowledge_cache_ttl_seconds: 1800
language_preferences: []
license: MIT
name: super-dev
output_dir: output
phases:
- discovery
- intelligence
- drafting
- redteam
- qa
- delivery
- deployment
platform: web
quality_gate: 90
state_management: []
testing_frameworks: []
version: 2.3.1

