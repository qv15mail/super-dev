version: "3.8"

services:
  # ========== Super Dev API ==========
  super-dev-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SUPER_DEV_PORT:-8000}:8000"
    environment:
      - SUPER_DEV_API_KEY=${SUPER_DEV_API_KEY:-}
      - SUPER_DEV_LOG_LEVEL=${SUPER_DEV_LOG_LEVEL:-info}
      - SUPER_DEV_LOG_FORMAT=${SUPER_DEV_LOG_FORMAT:-text}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./output:/app/output
      - ./.super-dev:/app/.super-dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ========== PostgreSQL (optional, for persistent storage) ==========
  postgres:
    image: postgres:15-alpine
    profiles:
      - with-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=super_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    restart: unless-stopped

  # ========== Redis (optional, for caching) ==========
  redis:
    image: redis:7-alpine
    profiles:
      - with-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
