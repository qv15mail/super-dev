stages:
  - quality
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}/super-dev
  DOCKER_TLS_CERTDIR: "/certs"

# ========== 质量检查 ==========
quality:
  stage: quality
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache nodejs npm git
  script:
    - |
      if [ -f frontend/package.json ]; then
        npm --prefix frontend ci
      fi
      if [ -f backend/package.json ]; then
        npm --prefix backend ci
      fi
      if [ -f backend/requirements.txt ] || [ -f requirements.txt ] || [ -f pyproject.toml ]; then
        pip install -e ".[dev]"
      fi
    - |
      if [ -f frontend/package.json ]; then
        npm --prefix frontend run lint --if-present
        npm --prefix frontend run type-check --if-present
      fi
      if [ -f backend/package.json ]; then
        npm --prefix backend run lint --if-present
      fi
      if [ -d super_dev ]; then
        ruff check super_dev tests
        mypy super_dev
      fi
  cache:
    paths:
      - frontend/node_modules/
      - backend/node_modules/
  only:
    - merge_requests
    - main
    - develop

# ========== 单元测试 ==========
test:
  stage: test
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache nodejs npm
  services:
    - postgres:15-alpine
    - redis:7-alpine
  variables:
    POSTGRES_HOST: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: test_db
    REDIS_HOST: redis
  script:
    - |
      if [ -f frontend/package.json ]; then
        npm --prefix frontend ci
        npm --prefix frontend run test --if-present
      fi
      if [ -f backend/package.json ]; then
        npm --prefix backend ci
        npm --prefix backend run test --if-present
      fi
      if [ -d tests ]; then
        pip install -e ".[dev]"
        pytest -q
      fi
  cache:
    paths:
      - frontend/node_modules/
      - backend/node_modules/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    paths:
      - coverage/
      - frontend/coverage/
      - backend/coverage/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# ========== 安全扫描 ==========
security:
  stage: test
  image: aquasec/trivy:latest
  script:
    - trivy fs --format sarif --output trivy-results.sarif .
  artifacts:
    reports:
      sast: trivy-results.sarif
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# ========== 构建镜像 ==========
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker tag $DOCKER_IMAGE:$CI_COMMIT_SHA $DOCKER_IMAGE:latest
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
    - develop

# ========== 部署到开发环境 ==========
deploy:dev:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_DEV
    - kubectl apply -f k8s/ -n dev
    - kubectl set image deployment/super-dev super-dev=$DOCKER_IMAGE:$CI_COMMIT_SHA -n dev
    - kubectl rollout status deployment/super-dev -n dev
  environment:
    name: development
    url: https://dev.super-dev.example.com
  only:
    - develop

# ========== 部署到生产环境 ==========
deploy:prod:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_PROD
    - kubectl apply -f k8s/ -n prod
    - kubectl set image deployment/super-dev super-dev=$DOCKER_IMAGE:$CI_COMMIT_SHA -n prod
    - kubectl rollout status deployment/super-dev -n prod
  environment:
    name: production
    url: https://super-dev.example.com
  when: manual
  only:
    - main
