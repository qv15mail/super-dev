<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Block 1 Gradient (Top) -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>

    <!-- Block 2 Gradient (Mid) -->
    <linearGradient id="midGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>

    <!-- Block 3 Gradient (Bot) -->
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Glossy Overlay -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="500" height="160" fill="url(#bgGrad)" rx="16" />

  <!-- Logo Mark -->
  <g transform="translate(30, 21)">
    
    <!-- Vertical Data Beam -->
    <line x1="40" y1="-5" x2="40" y2="123" stroke="#38BDF8" stroke-width="2" stroke-dasharray="4,4" opacity="0.5" filter="url(#glow)"/>

    <!-- BLOCK 3 (Bot) -->
    <!-- Base Glow -->
    <path d="M 40 70 L 75 90 L 40 110 L 5 90 Z" fill="url(#botGrad)" filter="url(#glow)" opacity="0.6"/>
    <!-- Branch -->
    <polyline points="40,90 57.5,100 70,100" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="2,2" fill="none" opacity="0.8"/>
    <!-- Faces -->
    <path d="M 40 70 L 75 90 L 40 110 L 5 90 Z" fill="url(#botGrad)" />
    <path d="M 40 70 L 75 90 L 40 110 L 5 90 Z" fill="url(#gloss)" />
    <path d="M 5 90 L 40 110 L 40 118 L 5 98 Z" fill="#1E40AF" />
    <path d="M 75 90 L 40 110 L 40 118 L 75 98 Z" fill="#1E3A8A" />
    <circle cx="70" cy="100" r="2.5" fill="#38BDF8" filter="url(#glow)"/>

    <!-- BLOCK 2 (Mid) -->
    <!-- Base Glow -->
    <path d="M 40 35 L 75 55 L 40 75 L 5 55 Z" fill="url(#midGrad)" filter="url(#glow)" opacity="0.6"/>
    <!-- Branch -->
    <polyline points="40,55 22.5,45 10,45" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="2,2" fill="none" opacity="0.8"/>
    <!-- Faces -->
    <path d="M 40 35 L 75 55 L 40 75 L 5 55 Z" fill="url(#midGrad)" />
    <path d="M 40 35 L 75 55 L 40 75 L 5 55 Z" fill="url(#gloss)" />
    <path d="M 5 55 L 40 75 L 40 83 L 5 63 Z" fill="#5B21B6" />
    <path d="M 75 55 L 40 75 L 40 83 L 75 63 Z" fill="#4C1D95" />
    <circle cx="10" cy="45" r="2.5" fill="#C084FC" filter="url(#glow)"/>

    <!-- BLOCK 1 (Top) -->
    <!-- Base Glow -->
    <path d="M 40 0 L 75 20 L 40 40 L 5 20 Z" fill="url(#topGrad)" filter="url(#glow)" opacity="0.6"/>
    <!-- Branch -->
    <polyline points="40,20 57.5,10 70,10" stroke="#F472B6" stroke-width="1.5" stroke-dasharray="2,2" fill="none" opacity="0.8"/>
    <!-- Faces -->
    <path d="M 40 0 L 75 20 L 40 40 L 5 20 Z" fill="url(#topGrad)" />
    <path d="M 40 0 L 75 20 L 40 40 L 5 20 Z" fill="url(#gloss)" />
    <path d="M 5 20 L 40 40 L 40 48 L 5 28 Z" fill="#BE185D" />
    <path d="M 75 20 L 40 40 L 40 48 L 75 28 Z" fill="#9F1239" />
    <circle cx="70" cy="10" r="2.5" fill="#F472B6" filter="url(#glow)"/>

    <!-- Connection Nodes on Top Faces -->
    <circle cx="40" cy="20" r="3" fill="#FFFFFF" />
    <circle cx="40" cy="55" r="3" fill="#FFFFFF" />
    <circle cx="40" cy="90" r="3" fill="#FFFFFF" />
  </g>

  <!-- Typography -->
  <text x="140" y="87" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="48" fill="#F8FAFC" letter-spacing="-1.5">
    Super <tspan fill="#38BDF8">Dev</tspan>
  </text>
  
  <text x="143" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="12" fill="#94A3B8" letter-spacing="4.5">
    AI PIPELINE ORCHESTRATOR
  </text>
</svg>
