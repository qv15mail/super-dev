<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>从0到1 vs 从1到N+1 对比</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F172A; font-family: 'Droid Sans Fallback', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#0F172A"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>

  <text x="600" y="40" fill="#E2E8F0" font-size="22" font-weight="700" text-anchor="middle">从 0 到 1 vs 从 1 到 N+1 · 两种开发模式对比</text>

  <!-- ===== Left: 0→1 ===== -->
  <rect x="40" y="75" width="540" height="620" rx="16" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
  <rect x="40" y="75" width="540" height="50" rx="16" fill="#1E40AF"/>
  <rect x="40" y="100" width="540" height="25" fill="#1E40AF"/>
  <text x="310" y="107" fill="#fff" font-size="18" font-weight="700" text-anchor="middle"> 从 0 到 1：新项目模式</text>

  <!-- Step 1 -->
  <rect x="70" y="145" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="100" cy="175" r="16" fill="#3B82F6"/>
  <text x="100" y="180" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="130" y="168" fill="#E2E8F0" font-size="13" font-weight="600">一句话启动</text>
  <text x="130" y="188" fill="#94A3B8" font-size="10">super-dev "创建一个在线教育平台"</text>

  <line x1="310" y1="205" x2="310" y2="218" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 2 -->
  <rect x="70" y="218" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="100" cy="248" r="16" fill="#3B82F6"/>
  <text x="100" y="253" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="130" y="241" fill="#E2E8F0" font-size="13" font-weight="600">自动研究</text>
  <text x="130" y="261" fill="#94A3B8" font-size="10">检索知识库 → 竞品分析 → 生成 research.md</text>

  <line x1="310" y1="278" x2="310" y2="291" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 3 -->
  <rect x="70" y="291" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="100" cy="321" r="16" fill="#3B82F6"/>
  <text x="100" y="326" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="130" y="314" fill="#E2E8F0" font-size="13" font-weight="600">三大文档自动生成</text>
  <text x="130" y="334" fill="#94A3B8" font-size="10">PRD + 架构设计 + UI/UX 设计文档</text>

  <line x1="310" y1="351" x2="310" y2="364" stroke="#F59E0B" stroke-width="2"/>

  <!-- Gate 1 -->
  <rect x="70" y="364" width="480" height="48" rx="10" fill="#422006" stroke="#F59E0B" stroke-width="2" filter="url(#glow)"/>
  <text x="310" y="394" fill="#FCD34D" font-size="13" font-weight="700" text-anchor="middle"> 门禁 1：文档确认（必须人工审批通过才能继续）</text>

  <line x1="310" y1="412" x2="310" y2="425" stroke="#10B981" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 4 -->
  <rect x="70" y="425" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="100" cy="455" r="16" fill="#10B981"/>
  <text x="100" y="460" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">4</text>
  <text x="130" y="448" fill="#E2E8F0" font-size="13" font-weight="600">Spec + 前端优先开发</text>
  <text x="130" y="468" fill="#94A3B8" font-size="10">任务分解 → 前端实现 → 运行时验证</text>

  <line x1="310" y1="485" x2="310" y2="498" stroke="#F59E0B" stroke-width="2"/>

  <!-- Gate 2 -->
  <rect x="70" y="498" width="480" height="48" rx="10" fill="#422006" stroke="#F59E0B" stroke-width="2" filter="url(#glow)"/>
  <text x="310" y="528" fill="#FCD34D" font-size="13" font-weight="700" text-anchor="middle"> 门禁 2：预览确认（确认 UI 符合预期后继续）</text>

  <line x1="310" y1="546" x2="310" y2="559" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 5 -->
  <rect x="70" y="559" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="100" cy="589" r="16" fill="#8B5CF6"/>
  <text x="100" y="594" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">5</text>
  <text x="130" y="582" fill="#E2E8F0" font-size="13" font-weight="600">后端 + 质量 + 交付</text>
  <text x="130" y="602" fill="#94A3B8" font-size="10">后端开发 → 红队审查 → 质量门 → 证据包</text>

  <!-- Arrow -->
  <text x="310" y="668" fill="#3B82F6" font-size="13" font-weight="600" text-anchor="middle">⏱ 全流程一气呵成，两次人工确认</text>

  <!-- ===== Right: 1→N+1 ===== -->
  <rect x="620" y="75" width="540" height="620" rx="16" fill="#0F172A" stroke="#10B981" stroke-width="2"/>
  <rect x="620" y="75" width="540" height="50" rx="16" fill="#065F46"/>
  <rect x="620" y="100" width="540" height="25" fill="#065F46"/>
  <text x="890" y="107" fill="#fff" font-size="18" font-weight="700" text-anchor="middle"> 从 1 到 N+1：迭代开发模式</text>

  <!-- Step 1 -->
  <rect x="650" y="145" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="680" cy="175" r="16" fill="#10B981"/>
  <text x="680" y="180" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="710" y="168" fill="#E2E8F0" font-size="13" font-weight="600">查看变更列表</text>
  <text x="710" y="188" fill="#94A3B8" font-size="10">super-dev spec list → 找到要做的变更</text>

  <line x1="890" y1="205" x2="890" y2="218" stroke="#10B981" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 2 -->
  <rect x="650" y="218" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="680" cy="248" r="16" fill="#10B981"/>
  <text x="680" y="253" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="710" y="241" fill="#E2E8F0" font-size="13" font-weight="600">阅读 Spec 详情</text>
  <text x="710" y="261" fill="#94A3B8" font-size="10">proposal.md + tasks.md → 明确做什么、怎么做</text>

  <line x1="890" y1="278" x2="890" y2="291" stroke="#10B981" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 3 -->
  <rect x="650" y="291" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="680" cy="321" r="16" fill="#10B981"/>
  <text x="680" y="326" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="710" y="314" fill="#E2E8F0" font-size="13" font-weight="600">按优先级实现</text>
  <text x="710" y="334" fill="#94A3B8" font-size="10">SHALL（必须）→ SHOULD（应该）→ MAY（可以）</text>

  <line x1="890" y1="351" x2="890" y2="364" stroke="#10B981" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 4 -->
  <rect x="650" y="364" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="680" cy="394" r="16" fill="#10B981"/>
  <text x="680" y="399" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">4</text>
  <text x="710" y="387" fill="#E2E8F0" font-size="13" font-weight="600">验证完成度</text>
  <text x="710" y="407" fill="#94A3B8" font-size="10">super-dev spec validate &lt;change-id&gt;</text>

  <line x1="890" y1="424" x2="890" y2="437" stroke="#10B981" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 5 -->
  <rect x="650" y="437" width="480" height="60" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="680" cy="467" r="16" fill="#06B6D4"/>
  <text x="680" y="472" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">5</text>
  <text x="710" y="460" fill="#E2E8F0" font-size="13" font-weight="600">影响分析 + 回归防护</text>
  <text x="710" y="480" fill="#94A3B8" font-size="10">自动分析变更影响范围，防止破坏现有功能</text>

  <!-- Comparison table -->
  <rect x="650" y="520" width="480" height="155" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="890" y="548" fill="#E2E8F0" font-size="13" font-weight="700" text-anchor="middle">与 0→1 模式的关键区别</text>

  <text x="680" y="575" fill="#94A3B8" font-size="10">起点</text>
  <text x="780" y="575" fill="#60A5FA" font-size="10">0→1: 一句话需求</text>
  <text x="980" y="575" fill="#34D399" font-size="10">1→N: 已有代码库</text>

  <text x="680" y="598" fill="#94A3B8" font-size="10">研究</text>
  <text x="780" y="598" fill="#60A5FA" font-size="10">0→1: 全面竞品分析</text>
  <text x="980" y="598" fill="#34D399" font-size="10">1→N: 聚焦变更影响</text>

  <text x="680" y="621" fill="#94A3B8" font-size="10">文档</text>
  <text x="780" y="621" fill="#60A5FA" font-size="10">0→1: 全新生成</text>
  <text x="980" y="621" fill="#34D399" font-size="10">1→N: 增量更新</text>

  <text x="680" y="644" fill="#94A3B8" font-size="10">质量</text>
  <text x="780" y="644" fill="#60A5FA" font-size="10">0→1: 全局架构合理性</text>
  <text x="980" y="644" fill="#34D399" font-size="10">1→N: 回归防护+影响</text>

  <text x="680" y="667" fill="#94A3B8" font-size="10">实现</text>
  <text x="780" y="667" fill="#60A5FA" font-size="10">0→1: 全新搭建</text>
  <text x="980" y="667" fill="#34D399" font-size="10">1→N: 在现有代码迭代</text>

  <!-- Bottom -->
  <text x="600" y="730" fill="#334155" font-size="10" text-anchor="middle">Super Dev v2.1.5 · 两种开发模式对比</text>
</svg>
</body>
</html>
