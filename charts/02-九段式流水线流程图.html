<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Super Dev 九段式流水线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F172A; font-family: 'Droid Sans Fallback', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  svg { width: 1200px; height: 700px; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#0F172A"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748B"/></marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/></marker>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="45" fill="#E2E8F0" font-size="22" font-weight="700" text-anchor="middle">九段式流水线 · 全流程可视化</text>
  <text x="600" y="68" fill="#64748B" font-size="12" text-anchor="middle">PHASE_CHAIN: research → docs → docs_confirm → spec → frontend → preview_confirm → backend → quality → delivery</text>

  <!-- Phase 1: Research -->
  <rect x="40" y="110" width="115" height="80" rx="12" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
  <text x="97" y="140" fill="#60A5FA" font-size="11" font-weight="700" text-anchor="middle">阶段 1</text>
  <text x="97" y="160" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 研究</text>
  <text x="97" y="178" fill="#94A3B8" font-size="9" text-anchor="middle">竞品分析+知识库</text>

  <line x1="155" y1="150" x2="185" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Docs -->
  <rect x="185" y="110" width="115" height="80" rx="12" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
  <text x="242" y="140" fill="#60A5FA" font-size="11" font-weight="700" text-anchor="middle">阶段 2</text>
  <text x="242" y="160" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 文档生成</text>
  <text x="242" y="178" fill="#94A3B8" font-size="9" text-anchor="middle">PRD+架构+UI/UX</text>

  <line x1="300" y1="150" x2="330" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Doc Confirm (GATE) -->
  <rect x="330" y="100" width="125" height="100" rx="12" fill="#422006" stroke="#F59E0B" stroke-width="3" filter="url(#glow)"/>
  <text x="392" y="128" fill="#FCD34D" font-size="10" font-weight="700" text-anchor="middle"> 强制门禁 1</text>
  <text x="392" y="148" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 文档确认</text>
  <text x="392" y="168" fill="#FBBF24" font-size="9" text-anchor="middle">必须人工审批</text>
  <text x="392" y="185" fill="#F59E0B" font-size="9" text-anchor="middle">DOC_CONFIRM_GATE</text>

  <line x1="455" y1="150" x2="485" y2="150" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Phase 4: Spec -->
  <rect x="485" y="110" width="115" height="80" rx="12" fill="#1A3A2F" stroke="#10B981" stroke-width="2"/>
  <text x="542" y="140" fill="#34D399" font-size="11" font-weight="700" text-anchor="middle">阶段 4</text>
  <text x="542" y="160" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> Spec 生成</text>
  <text x="542" y="178" fill="#94A3B8" font-size="9" text-anchor="middle">任务分解</text>

  <line x1="600" y1="150" x2="630" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5: Frontend -->
  <rect x="630" y="110" width="115" height="80" rx="12" fill="#1A3A2F" stroke="#10B981" stroke-width="2"/>
  <text x="687" y="140" fill="#34D399" font-size="11" font-weight="700" text-anchor="middle">阶段 5</text>
  <text x="687" y="160" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 前端开发</text>
  <text x="687" y="178" fill="#94A3B8" font-size="9" text-anchor="middle">前端优先+运行时验证</text>

  <line x1="745" y1="150" x2="775" y2="150" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 6: Preview Confirm (GATE) -->
  <rect x="775" y="100" width="125" height="100" rx="12" fill="#422006" stroke="#F59E0B" stroke-width="3" filter="url(#glow)"/>
  <text x="837" y="128" fill="#FCD34D" font-size="10" font-weight="700" text-anchor="middle"> 强制门禁 2</text>
  <text x="837" y="148" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 预览确认</text>
  <text x="837" y="168" fill="#FBBF24" font-size="9" text-anchor="middle">确认 UI 符合预期</text>
  <text x="837" y="185" fill="#F59E0B" font-size="9" text-anchor="middle">PREVIEW_CONFIRM_GATE</text>

  <line x1="900" y1="150" x2="930" y2="150" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Phase 7: Backend -->
  <rect x="930" y="110" width="115" height="80" rx="12" fill="#2A1F3D" stroke="#8B5CF6" stroke-width="2"/>
  <text x="987" y="140" fill="#A78BFA" font-size="11" font-weight="700" text-anchor="middle">阶段 7</text>
  <text x="987" y="160" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 后端开发</text>
  <text x="987" y="178" fill="#94A3B8" font-size="9" text-anchor="middle">服务+测试</text>

  <!-- Arrow down from backend -->
  <path d="M987,190 L987,260" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 8: Quality -->
  <rect x="830" y="270" width="145" height="80" rx="12" fill="#3D1A1A" stroke="#EF4444" stroke-width="2"/>
  <text x="902" y="300" fill="#F87171" font-size="11" font-weight="700" text-anchor="middle">阶段 8</text>
  <text x="902" y="320" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 质量检查</text>
  <text x="902" y="338" fill="#94A3B8" font-size="9" text-anchor="middle">红队审查 + 质量门 ≥90</text>

  <!-- Arrow left from quality -->
  <path d="M830,310 L770,310" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 9: Delivery -->
  <rect x="625" y="270" width="145" height="80" rx="12" fill="#1A2F3D" stroke="#06B6D4" stroke-width="2"/>
  <text x="697" y="300" fill="#22D3EE" font-size="11" font-weight="700" text-anchor="middle">阶段 9</text>
  <text x="697" y="320" fill="#fff" font-size="14" font-weight="600" text-anchor="middle"> 交付</text>
  <text x="697" y="338" fill="#94A3B8" font-size="9" text-anchor="middle">证据包 + 发布就绪度</text>

  <!-- ===== 产出物标注区域 ===== -->
  <text x="600" y="420" fill="#E2E8F0" font-size="16" font-weight="700" text-anchor="middle">各阶段核心产出物</text>

  <!-- Output cards -->
  <rect x="40" y="450" width="150" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="115" y="475" fill="#60A5FA" font-size="11" font-weight="600" text-anchor="middle">研究阶段</text>
  <text x="115" y="495" fill="#CBD5E1" font-size="10" text-anchor="middle">*-research.md</text>
  <text x="115" y="512" fill="#64748B" font-size="9" text-anchor="middle">竞品分析报告</text>
  <text x="115" y="527" fill="#64748B" font-size="9" text-anchor="middle">知识库匹配缓存</text>

  <rect x="210" y="450" width="150" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="285" y="475" fill="#60A5FA" font-size="11" font-weight="600" text-anchor="middle">文档阶段</text>
  <text x="285" y="495" fill="#CBD5E1" font-size="10" text-anchor="middle">*-prd.md</text>
  <text x="285" y="512" fill="#CBD5E1" font-size="10" text-anchor="middle">*-architecture.md</text>
  <text x="285" y="527" fill="#CBD5E1" font-size="10" text-anchor="middle">*-uiux.md</text>

  <rect x="380" y="450" width="150" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="455" y="475" fill="#34D399" font-size="11" font-weight="600" text-anchor="middle">Spec 阶段</text>
  <text x="455" y="495" fill="#CBD5E1" font-size="10" text-anchor="middle">proposal.md</text>
  <text x="455" y="512" fill="#CBD5E1" font-size="10" text-anchor="middle">tasks.md</text>
  <text x="455" y="527" fill="#CBD5E1" font-size="10" text-anchor="middle">execution-plan.md</text>

  <rect x="550" y="450" width="150" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="625" y="475" fill="#34D399" font-size="11" font-weight="600" text-anchor="middle">实现阶段</text>
  <text x="625" y="495" fill="#CBD5E1" font-size="10" text-anchor="middle">前端代码 + 运行时验证</text>
  <text x="625" y="512" fill="#CBD5E1" font-size="10" text-anchor="middle">后端代码 + 测试</text>
  <text x="625" y="527" fill="#CBD5E1" font-size="10" text-anchor="middle">数据库迁移</text>

  <rect x="720" y="450" width="150" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="795" y="475" fill="#F87171" font-size="11" font-weight="600" text-anchor="middle">质量阶段</text>
  <text x="795" y="495" fill="#CBD5E1" font-size="10" text-anchor="middle">*-redteam.md</text>
  <text x="795" y="512" fill="#CBD5E1" font-size="10" text-anchor="middle">*-quality-gate.md</text>
  <text x="795" y="527" fill="#CBD5E1" font-size="10" text-anchor="middle">*-ui-review.md</text>

  <rect x="890" y="450" width="150" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="965" y="475" fill="#22D3EE" font-size="11" font-weight="600" text-anchor="middle">交付阶段</text>
  <text x="965" y="495" fill="#CBD5E1" font-size="10" text-anchor="middle">*-proof-pack.md</text>
  <text x="965" y="512" fill="#CBD5E1" font-size="10" text-anchor="middle">*-release-readiness.md</text>
  <text x="965" y="527" fill="#CBD5E1" font-size="10" text-anchor="middle">CI/CD 配置</text>

  <!-- Legend -->
  <rect x="40" y="580" width="1120" height="75" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="80" y="605" fill="#94A3B8" font-size="11" font-weight="600">图例：</text>
  <rect x="130" y="593" width="16" height="16" rx="3" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="155" y="605" fill="#CBD5E1" font-size="10">自动执行阶段</text>
  <rect x="280" y="593" width="16" height="16" rx="3" fill="#422006" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="305" y="605" fill="#CBD5E1" font-size="10">强制人工门禁</text>
  <rect x="430" y="593" width="16" height="16" rx="3" fill="#1A3A2F" stroke="#10B981" stroke-width="1.5"/>
  <text x="455" y="605" fill="#CBD5E1" font-size="10">实现阶段</text>
  <rect x="560" y="593" width="16" height="16" rx="3" fill="#3D1A1A" stroke="#EF4444" stroke-width="1.5"/>
  <text x="585" y="605" fill="#CBD5E1" font-size="10">质量保障</text>
  <rect x="680" y="593" width="16" height="16" rx="3" fill="#1A2F3D" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="705" y="605" fill="#CBD5E1" font-size="10">交付</text>

  <text x="80" y="638" fill="#F59E0B" font-size="11" font-weight="600">核心理念：</text>
  <text x="170" y="638" fill="#94A3B8" font-size="10">前端优先 → 可视化反馈最快 → 减少返工 → 两道门禁确保人类始终掌控方向</text>

  <!-- Watermark -->
  <text x="600" y="685" fill="#334155" font-size="10" text-anchor="middle">Super Dev v2.2.0 · 九段式流水线流程图</text>
</svg>
</body>
</html>
