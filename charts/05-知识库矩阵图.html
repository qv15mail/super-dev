<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Super Dev 知识库覆盖矩阵</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F172A; font-family: 'Droid Sans Fallback', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#0F172A"/></linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <text x="600" y="40" fill="#E2E8F0" font-size="22" font-weight="700" text-anchor="middle">知识库覆盖矩阵 · 21个主题域 × 6大子结构</text>
  <text x="600" y="62" fill="#64748B" font-size="11" text-anchor="middle">知识库内容被视为"硬约束"，AI 生成代码时必须遵守这些标准</text>

  <!-- Column headers -->
  <text x="250" y="102" fill="#60A5FA" font-size="11" font-weight="700" text-anchor="middle">标准</text>
  <text x="360" y="102" fill="#34D399" font-size="11" font-weight="700" text-anchor="middle">手册</text>
  <text x="470" y="102" fill="#FBBF24" font-size="11" font-weight="700" text-anchor="middle">检查清单</text>
  <text x="580" y="102" fill="#F87171" font-size="11" font-weight="700" text-anchor="middle">反模式</text>
  <text x="690" y="102" fill="#A78BFA" font-size="11" font-weight="700" text-anchor="middle">案例</text>
  <text x="800" y="102" fill="#22D3EE" font-size="11" font-weight="700" text-anchor="middle">术语</text>

  <!-- Sub-header labels -->
  <text x="250" y="116" fill="#475569" font-size="8" text-anchor="middle">01-standards</text>
  <text x="360" y="116" fill="#475569" font-size="8" text-anchor="middle">02-playbooks</text>
  <text x="470" y="116" fill="#475569" font-size="8" text-anchor="middle">03-checklists</text>
  <text x="580" y="116" fill="#475569" font-size="8" text-anchor="middle">04-antipatterns</text>
  <text x="690" y="116" fill="#475569" font-size="8" text-anchor="middle">05-cases</text>
  <text x="800" y="116" fill="#475569" font-size="8" text-anchor="middle">06-glossary</text>

  <line x1="60" y1="124" x2="850" y2="124" stroke="#334155" stroke-width="1"/>

  <script type="text/javascript"><![CDATA[
    // Data
    const domains = [
      { name: "治理", id: "00-governance", cat: "运营", color: "#94A3B8" },
      { name: "AI/ML", id: "ai", cat: "前沿", color: "#EC4899" },
      { name: "架构", id: "architecture", cat: "基础", color: "#3B82F6" },
      { name: "区块链", id: "blockchain", cat: "前沿", color: "#EC4899" },
      { name: "CI/CD", id: "cicd", cat: "运营", color: "#94A3B8" },
      { name: "云原生", id: "cloud-native", cat: "专业", color: "#10B981" },
      { name: "数据管理", id: "data", cat: "专业", color: "#10B981" },
      { name: "数据工程", id: "data-engineering", cat: "专业", color: "#10B981" },
      { name: "设计系统", id: "design", cat: "设计", color: "#8B5CF6" },
      { name: "开发实践", id: "development", cat: "基础", color: "#3B82F6" },
      { name: "边缘/IoT", id: "edge-iot", cat: "专业", color: "#10B981" },
      { name: "事件管理", id: "incident", cat: "运营", color: "#94A3B8" },
      { name: "行业知识", id: "industries", cat: "行业", color: "#F59E0B" },
      { name: "低代码", id: "low-code", cat: "前沿", color: "#EC4899" },
      { name: "移动开发", id: "mobile", cat: "专业", color: "#10B981" },
      { name: "运维", id: "operations", cat: "运营", color: "#94A3B8" },
      { name: "产品管理", id: "product", cat: "设计", color: "#8B5CF6" },
      { name: "量子计算", id: "quantum", cat: "前沿", color: "#EC4899" },
      { name: "安全", id: "security", cat: "基础", color: "#3B82F6" },
      { name: "测试", id: "testing", cat: "基础", color: "#3B82F6" },
    ];

    const svg = document.querySelector('svg');
    const startY = 135;
    const rowH = 30;
    const cols = [250, 360, 470, 580, 690, 800];
    const cellColors = ['#1E3A5F', '#1A3A2F', '#3D2F1A', '#3D1A1A', '#2A1F3D', '#1A2F3D'];
    const dotColors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#06B6D4'];

    domains.forEach((d, i) => {
      const y = startY + i * rowH;

      // Category badge
      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      badge.setAttribute('x', '60'); badge.setAttribute('y', String(y));
      badge.setAttribute('width', '42'); badge.setAttribute('height', '18');
      badge.setAttribute('rx', '9'); badge.setAttribute('fill', d.color); badge.setAttribute('opacity', '0.2');
      svg.appendChild(badge);
      const catLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      catLabel.setAttribute('x', '81'); catLabel.setAttribute('y', String(y + 13));
      catLabel.setAttribute('fill', d.color); catLabel.setAttribute('font-size', '8');
      catLabel.setAttribute('font-weight', '600'); catLabel.setAttribute('text-anchor', 'middle');
      catLabel.textContent = d.cat;
      svg.appendChild(catLabel);

      // Domain name
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', '115'); label.setAttribute('y', String(y + 14));
      label.setAttribute('fill', '#CBD5E1'); label.setAttribute('font-size', '11');
      label.textContent = d.name;
      svg.appendChild(label);

      // Dots for each sub-structure
      cols.forEach((cx, ci) => {
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        dot.setAttribute('x', String(cx - 16)); dot.setAttribute('y', String(y + 1));
        dot.setAttribute('width', '32'); dot.setAttribute('height', '16');
        dot.setAttribute('rx', '4'); dot.setAttribute('fill', cellColors[ci]);
        dot.setAttribute('stroke', dotColors[ci]); dot.setAttribute('stroke-width', '1');
        dot.setAttribute('opacity', '0.8');
        svg.appendChild(dot);
        const check = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        check.setAttribute('x', String(cx)); check.setAttribute('y', String(y + 13));
        check.setAttribute('fill', dotColors[ci]); check.setAttribute('font-size', '10');
        check.setAttribute('text-anchor', 'middle'); check.setAttribute('font-weight', '600');
        check.textContent = '+';
        svg.appendChild(check);
      });

      // Separator
      if (i < domains.length - 1) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', '60'); line.setAttribute('y1', String(y + 25));
        line.setAttribute('x2', '850'); line.setAttribute('y2', String(y + 25));
        line.setAttribute('stroke', '#1E293B'); line.setAttribute('stroke-width', '1');
        svg.appendChild(line);
      }
    });
  ]]></script>

  <!-- Right panel: Stats -->
  <rect x="880" y="130" width="280" height="520" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="1020" y="165" fill="#E2E8F0" font-size="15" font-weight="700" text-anchor="middle">知识库统计</text>

  <!-- Stat: Total domains -->
  <rect x="910" y="185" width="240" height="55" rx="8" fill="#0F172A"/>
  <text x="940" y="215" fill="#3B82F6" font-size="30" font-weight="800">21</text>
  <text x="990" y="205" fill="#CBD5E1" font-size="11">个主题域</text>
  <text x="990" y="222" fill="#64748B" font-size="9">覆盖软件开发方方面面</text>

  <!-- Stat: Sub-structures -->
  <rect x="910" y="255" width="240" height="55" rx="8" fill="#0F172A"/>
  <text x="940" y="285" fill="#10B981" font-size="30" font-weight="800">6</text>
  <text x="970" y="275" fill="#CBD5E1" font-size="11">大子结构</text>
  <text x="970" y="292" fill="#64748B" font-size="9">统一组织，易于检索</text>

  <!-- Stat: Total files -->
  <rect x="910" y="325" width="240" height="55" rx="8" fill="#0F172A"/>
  <text x="955" y="355" fill="#F59E0B" font-size="30" font-weight="800">100+</text>
  <text x="1015" y="345" fill="#CBD5E1" font-size="11">份知识文档</text>
  <text x="1015" y="362" fill="#64748B" font-size="9">标准、手册、检查清单等</text>

  <!-- Category breakdown -->
  <text x="1020" y="415" fill="#CBD5E1" font-size="12" font-weight="600" text-anchor="middle">按分类统计</text>

  <rect x="920" y="430" width="14" height="14" rx="3" fill="#3B82F6"/>
  <text x="942" y="442" fill="#CBD5E1" font-size="10">基础层</text>
  <text x="1100" y="442" fill="#60A5FA" font-size="11" font-weight="600" text-anchor="end">4 个域</text>
  <text x="942" y="455" fill="#64748B" font-size="8">架构 · 开发 · 安全 · 测试</text>

  <rect x="920" y="468" width="14" height="14" rx="3" fill="#10B981"/>
  <text x="942" y="480" fill="#CBD5E1" font-size="10">专业层</text>
  <text x="1100" y="480" fill="#34D399" font-size="11" font-weight="600" text-anchor="end">5 个域</text>
  <text x="942" y="493" fill="#64748B" font-size="8">云原生 · 数据 · 移动 · IoT ...</text>

  <rect x="920" y="506" width="14" height="14" rx="3" fill="#8B5CF6"/>
  <text x="942" y="518" fill="#CBD5E1" font-size="10">设计层</text>
  <text x="1100" y="518" fill="#A78BFA" font-size="11" font-weight="600" text-anchor="end">2 个域</text>
  <text x="942" y="531" fill="#64748B" font-size="8">设计系统 · 产品管理</text>

  <rect x="920" y="544" width="14" height="14" rx="3" fill="#EC4899"/>
  <text x="942" y="556" fill="#CBD5E1" font-size="10">前沿层</text>
  <text x="1100" y="556" fill="#F472B6" font-size="11" font-weight="600" text-anchor="end">4 个域</text>
  <text x="942" y="569" fill="#64748B" font-size="8">AI · 区块链 · 量子 · 低代码</text>

  <rect x="920" y="582" width="14" height="14" rx="3" fill="#F59E0B"/>
  <text x="942" y="594" fill="#CBD5E1" font-size="10">行业层</text>
  <text x="1100" y="594" fill="#FBBF24" font-size="11" font-weight="600" text-anchor="end">1 个域</text>
  <text x="942" y="607" fill="#64748B" font-size="8">金融 · 医疗 · 电商等行业特定</text>

  <rect x="920" y="620" width="14" height="14" rx="3" fill="#94A3B8"/>
  <text x="942" y="632" fill="#CBD5E1" font-size="10">运营层</text>
  <text x="1100" y="632" fill="#94A3B8" font-size="11" font-weight="600" text-anchor="end">4 个域</text>
  <text x="942" y="645" fill="#64748B" font-size="8">治理 · CI/CD · 事件 · 运维</text>

  <!-- Bottom note -->
  <rect x="60" y="710" width="1080" height="55" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
  <text x="100" y="735" fill="#FCD34D" font-size="12" font-weight="700"> 关键设计理念</text>
  <text x="100" y="753" fill="#CBD5E1" font-size="11">知识库的内容被视为"硬约束"而非"可选建议"。AI 在生成文档和代码时，必须遵守匹配到的标准、场景包和检查清单，这是 Super Dev 能保证输出质量的核心原因。</text>

  <text x="600" y="790" fill="#334155" font-size="10" text-anchor="middle">Super Dev v2.1.5 · 知识库覆盖矩阵</text>
</svg>
</body>
</html>
