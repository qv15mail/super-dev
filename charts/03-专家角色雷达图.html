<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Super Dev 十一大专家角色分布</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F172A; font-family: 'Droid Sans Fallback', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#0F172A"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="45" fill="#E2E8F0" font-size="22" font-weight="700" text-anchor="middle">十一大专家角色 · 覆盖产品开发全链路</text>
  <text x="600" y="68" fill="#64748B" font-size="12" text-anchor="middle">每个角色都有详细的专业背景、思维框架、质量标准和交接清单</text>

  <!-- Center circle -->
  <circle cx="600" cy="400" r="55" fill="#1E40AF" stroke="#3B82F6" stroke-width="3" filter="url(#glow)"/>
  <text x="600" y="395" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Super Dev</text>
  <text x="600" y="413" fill="#93C5FD" font-size="10" text-anchor="middle">专家编排引擎</text>

  <!-- Expert nodes arranged in a circle -->
  <!-- PRODUCT - top -->
  <circle cx="600" cy="180" r="48" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
  <text x="600" y="175" fill="#60A5FA" font-size="20" text-anchor="middle"></text>
  <text x="600" y="195" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">PRODUCT</text>
  <line x1="600" y1="345" x2="600" y2="228" stroke="#3B82F6" stroke-width="1.5" opacity="0.4"/>
  <text x="600" y="135" fill="#94A3B8" font-size="9" text-anchor="middle">全局产品审查</text>
  <text x="600" y="148" fill="#64748B" font-size="8" text-anchor="middle">首次上手路径 · 功能闭环</text>

  <!-- PM - top-right -->
  <circle cx="810" cy="225" r="45" fill="#1A3A2F" stroke="#10B981" stroke-width="2.5"/>
  <text x="810" y="220" fill="#34D399" font-size="20" text-anchor="middle"></text>
  <text x="810" y="240" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">PM</text>
  <line x1="648" y1="368" x2="770" y2="250" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>
  <text x="870" y="210" fill="#94A3B8" font-size="9" text-anchor="start">需求分析</text>
  <text x="870" y="223" fill="#64748B" font-size="8" text-anchor="start">用户故事 · 验收标准</text>

  <!-- ARCHITECT - right -->
  <circle cx="890" cy="360" r="45" fill="#1A3A2F" stroke="#10B981" stroke-width="2.5"/>
  <text x="890" y="355" fill="#34D399" font-size="20" text-anchor="middle"></text>
  <text x="890" y="375" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">ARCHITECT</text>
  <line x1="655" y1="395" x2="845" y2="365" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>
  <text x="950" y="350" fill="#94A3B8" font-size="9" text-anchor="start">系统设计</text>
  <text x="950" y="363" fill="#64748B" font-size="8" text-anchor="start">可扩展性 · 技术选型</text>

  <!-- UI - right-bottom -->
  <circle cx="870" cy="510" r="45" fill="#2A1F3D" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="870" y="505" fill="#A78BFA" font-size="20" text-anchor="middle"></text>
  <text x="870" y="525" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">UI</text>
  <line x1="645" y1="430" x2="830" y2="495" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <text x="930" y="500" fill="#94A3B8" font-size="9" text-anchor="start">视觉设计</text>
  <text x="930" y="513" fill="#64748B" font-size="8" text-anchor="start">色彩 · 字体 · 组件</text>

  <!-- UX - bottom-right -->
  <circle cx="760" cy="610" r="45" fill="#2A1F3D" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="760" y="605" fill="#A78BFA" font-size="20" text-anchor="middle"></text>
  <text x="760" y="625" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">UX</text>
  <line x1="625" y1="448" x2="730" y2="575" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <text x="760" y="665" fill="#94A3B8" font-size="9" text-anchor="middle">交互设计</text>
  <text x="760" y="678" fill="#64748B" font-size="8" text-anchor="middle">用户体验 · 无障碍</text>

  <!-- SECURITY - bottom -->
  <circle cx="600" cy="640" r="45" fill="#3D1A1A" stroke="#EF4444" stroke-width="2.5"/>
  <text x="600" y="635" fill="#F87171" font-size="20" text-anchor="middle"></text>
  <text x="600" y="655" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">SECURITY</text>
  <line x1="600" y1="455" x2="600" y2="595" stroke="#EF4444" stroke-width="1.5" opacity="0.4"/>
  <text x="600" y="695" fill="#94A3B8" font-size="9" text-anchor="middle">安全审查</text>
  <text x="600" y="708" fill="#64748B" font-size="8" text-anchor="middle">注入 · 认证 · XSS · CSRF</text>

  <!-- CODE - bottom-left -->
  <circle cx="440" cy="610" r="45" fill="#1A2F3D" stroke="#06B6D4" stroke-width="2.5"/>
  <text x="440" y="605" fill="#22D3EE" font-size="20" text-anchor="middle"></text>
  <text x="440" y="625" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">CODE</text>
  <line x1="575" y1="448" x2="470" y2="575" stroke="#06B6D4" stroke-width="1.5" opacity="0.4"/>
  <text x="440" y="665" fill="#94A3B8" font-size="9" text-anchor="middle">代码实现</text>
  <text x="440" y="678" fill="#64748B" font-size="8" text-anchor="middle">设计模式 · 可测试性</text>

  <!-- DBA - left-bottom -->
  <circle cx="330" cy="510" r="45" fill="#1A2F3D" stroke="#06B6D4" stroke-width="2.5"/>
  <text x="330" y="505" fill="#22D3EE" font-size="20" text-anchor="middle"></text>
  <text x="330" y="525" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">DBA</text>
  <line x1="555" y1="430" x2="370" y2="495" stroke="#06B6D4" stroke-width="1.5" opacity="0.4"/>
  <text x="270" y="500" fill="#94A3B8" font-size="9" text-anchor="end">数据库设计</text>
  <text x="270" y="513" fill="#64748B" font-size="8" text-anchor="end">数据模型 · 索引 · 迁移</text>

  <!-- QA - left -->
  <circle cx="310" cy="360" r="45" fill="#3D2F1A" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="310" y="355" fill="#FBBF24" font-size="20" text-anchor="middle"></text>
  <text x="310" y="375" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">QA</text>
  <line x1="545" y1="395" x2="355" y2="365" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  <text x="250" y="350" fill="#94A3B8" font-size="9" text-anchor="end">质量保证</text>
  <text x="250" y="363" fill="#64748B" font-size="8" text-anchor="end">测试覆盖 · 边界 · 回归</text>

  <!-- DEVOPS - top-left -->
  <circle cx="390" cy="225" r="45" fill="#3D2F1A" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="390" y="220" fill="#FBBF24" font-size="20" text-anchor="middle"></text>
  <text x="390" y="240" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">DEVOPS</text>
  <line x1="552" y1="368" x2="430" y2="250" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  <text x="330" y="210" fill="#94A3B8" font-size="9" text-anchor="end">部署运维</text>
  <text x="330" y="223" fill="#64748B" font-size="8" text-anchor="end">CI/CD · 监控 · 回滚</text>

  <!-- RCA - top-left-upper -->
  <circle cx="470" cy="150" r="40" fill="#3D1A2F" stroke="#EC4899" stroke-width="2"/>
  <text x="470" y="145" fill="#F472B6" font-size="18" text-anchor="middle"></text>
  <text x="470" y="163" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">RCA</text>
  <line x1="565" y1="355" x2="498" y2="183" stroke="#EC4899" stroke-width="1.5" opacity="0.4"/>
  <text x="470" y="105" fill="#94A3B8" font-size="9" text-anchor="middle">根因分析</text>
  <text x="470" y="118" fill="#64748B" font-size="8" text-anchor="middle">故障定位 · 防止复发</text>

  <!-- Category labels -->
  <rect x="40" y="740" width="1120" height="40" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="100" cy="760" r="6" fill="#3B82F6"/><text x="115" y="764" fill="#CBD5E1" font-size="10">产品管理</text>
  <circle cx="230" cy="760" r="6" fill="#10B981"/><text x="245" y="764" fill="#CBD5E1" font-size="10">技术架构</text>
  <circle cx="360" cy="760" r="6" fill="#8B5CF6"/><text x="375" y="764" fill="#CBD5E1" font-size="10">设计体验</text>
  <circle cx="490" cy="760" r="6" fill="#EF4444"/><text x="505" y="764" fill="#CBD5E1" font-size="10">安全防护</text>
  <circle cx="620" cy="760" r="6" fill="#06B6D4"/><text x="635" y="764" fill="#CBD5E1" font-size="10">开发实现</text>
  <circle cx="750" cy="760" r="6" fill="#F59E0B"/><text x="765" y="764" fill="#CBD5E1" font-size="10">质量运维</text>
  <circle cx="880" cy="760" r="6" fill="#EC4899"/><text x="895" y="764" fill="#CBD5E1" font-size="10">问题诊断</text>
</svg>
</body>
</html>
