<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Super Dev 质量保障体系</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F172A; font-family: 'Droid Sans Fallback', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#0F172A"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="40" fill="#E2E8F0" font-size="22" font-weight="700" text-anchor="middle">质量保障体系 · 多维度评分仪表盘</text>

  <!-- ===== Quality Gate Gauge ===== -->
  <text x="300" y="95" fill="#E2E8F0" font-size="16" font-weight="600" text-anchor="middle">质量门评分 (Quality Gate)</text>

  <!-- Gauge background -->
  <path d="M150,320 A150,150 0 0,1 450,320" fill="none" stroke="#1E293B" stroke-width="30" stroke-linecap="round"/>
  <!-- Gauge red zone (0-60) -->
  <path d="M150,320 A150,150 0 0,1 195,195" fill="none" stroke="#7F1D1D" stroke-width="30" stroke-linecap="round"/>
  <!-- Gauge yellow zone (60-80) -->
  <path d="M195,195 A150,150 0 0,1 300,170" fill="none" stroke="#78350F" stroke-width="30" stroke-linecap="round"/>
  <!-- Gauge green zone (80-100) -->
  <path d="M300,170 A150,150 0 0,1 450,320" fill="none" stroke="#14532D" stroke-width="30" stroke-linecap="round"/>

  <!-- Gauge value arc (90/100) = 162 degrees -->
  <path d="M150,320 A150,150 0 0,1 437,238" fill="none" stroke="#10B981" stroke-width="30" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Gauge center -->
  <text x="300" y="290" fill="#10B981" font-size="56" font-weight="800" text-anchor="middle">90</text>
  <text x="300" y="318" fill="#94A3B8" font-size="14" text-anchor="middle">/ 100 分</text>
  <text x="300" y="350" fill="#34D399" font-size="12" font-weight="600" text-anchor="middle">默认通过门槛</text>

  <!-- Scale labels -->
  <text x="135" y="340" fill="#F87171" font-size="10" text-anchor="middle">0</text>
  <text x="160" y="230" fill="#FBBF24" font-size="10" text-anchor="middle">40</text>
  <text x="250" y="165" fill="#FBBF24" font-size="10" text-anchor="middle">60</text>
  <text x="350" y="165" fill="#34D399" font-size="10" text-anchor="middle">80</text>
  <text x="460" y="340" fill="#34D399" font-size="10" text-anchor="middle">100</text>

  <!-- Score dimension bars -->
  <text x="300" y="405" fill="#E2E8F0" font-size="14" font-weight="600" text-anchor="middle">五大评分维度</text>

  <!-- Dimension 1: 文档完整性 -->
  <text x="115" y="440" fill="#CBD5E1" font-size="11" text-anchor="start">文档完整性</text>
  <rect x="220" y="428" width="240" height="16" rx="8" fill="#1E293B"/>
  <rect x="220" y="428" width="216" height="16" rx="8" fill="#3B82F6"/>
  <text x="470" y="441" fill="#60A5FA" font-size="11" font-weight="600">90%</text>

  <!-- Dimension 2: 安全评估 -->
  <text x="115" y="468" fill="#CBD5E1" font-size="11" text-anchor="start">安全评估</text>
  <rect x="220" y="456" width="240" height="16" rx="8" fill="#1E293B"/>
  <rect x="220" y="456" width="204" height="16" rx="8" fill="#EF4444"/>
  <text x="470" y="469" fill="#F87171" font-size="11" font-weight="600">85%</text>

  <!-- Dimension 3: 性能优化 -->
  <text x="115" y="496" fill="#CBD5E1" font-size="11" text-anchor="start">性能优化</text>
  <rect x="220" y="484" width="240" height="16" rx="8" fill="#1E293B"/>
  <rect x="220" y="484" width="221" height="16" rx="8" fill="#F59E0B"/>
  <text x="470" y="497" fill="#FBBF24" font-size="11" font-weight="600">92%</text>

  <!-- Dimension 4: 测试覆盖 -->
  <text x="115" y="524" fill="#CBD5E1" font-size="11" text-anchor="start">测试覆盖</text>
  <rect x="220" y="512" width="240" height="16" rx="8" fill="#1E293B"/>
  <rect x="220" y="512" width="211" height="16" rx="8" fill="#10B981"/>
  <text x="470" y="525" fill="#34D399" font-size="11" font-weight="600">88%</text>

  <!-- Dimension 5: 代码质量 -->
  <text x="115" y="552" fill="#CBD5E1" font-size="11" text-anchor="start">代码质量</text>
  <rect x="220" y="540" width="240" height="16" rx="8" fill="#1E293B"/>
  <rect x="220" y="540" width="228" height="16" rx="8" fill="#8B5CF6"/>
  <text x="470" y="553" fill="#A78BFA" font-size="11" font-weight="600">95%</text>

  <!-- ===== Red Team Panel ===== -->
  <text x="850" y="95" fill="#E2E8F0" font-size="16" font-weight="600" text-anchor="middle">红队审查 (Red Team Review)</text>
  <text x="850" y="115" fill="#64748B" font-size="11" text-anchor="middle">对抗性安全 · 性能 · 架构审查</text>

  <!-- Security Issues -->
  <rect x="620" y="140" width="460" height="170" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="650" y="168" fill="#F87171" font-size="13" font-weight="700"> 安全审查</text>

  <rect x="650" y="185" width="90" height="45" rx="6" fill="#7F1D1D" stroke="#EF4444" stroke-width="1"/>
  <text x="695" y="206" fill="#FCA5A5" font-size="18" font-weight="700" text-anchor="middle">CRIT</text>
  <text x="695" y="222" fill="#F87171" font-size="9" text-anchor="middle">注入攻击</text>

  <rect x="755" y="185" width="90" height="45" rx="6" fill="#7F1D1D" stroke="#F87171" stroke-width="1"/>
  <text x="800" y="206" fill="#FCA5A5" font-size="18" font-weight="700" text-anchor="middle">HIGH</text>
  <text x="800" y="222" fill="#F87171" font-size="9" text-anchor="middle">认证漏洞</text>

  <rect x="860" y="185" width="90" height="45" rx="6" fill="#422006" stroke="#F59E0B" stroke-width="1"/>
  <text x="905" y="206" fill="#FCD34D" font-size="18" font-weight="700" text-anchor="middle">MED</text>
  <text x="905" y="222" fill="#FBBF24" font-size="9" text-anchor="middle">XSS · CSRF</text>

  <rect x="965" y="185" width="90" height="45" rx="6" fill="#1E293B" stroke="#6B7280" stroke-width="1"/>
  <text x="1010" y="206" fill="#D1D5DB" font-size="18" font-weight="700" text-anchor="middle">LOW</text>
  <text x="1010" y="222" fill="#9CA3AF" font-size="9" text-anchor="middle">信息泄露</text>

  <!-- CWE mapping -->
  <text x="650" y="260" fill="#94A3B8" font-size="10">每个问题映射 CWE 编号 · 附修复建议 · 标注文件/行号</text>
  <text x="650" y="278" fill="#64748B" font-size="10">检查类别：注入 · 认证 · XSS · CSRF · 文件上传 · 信息泄露 · 权限提升</text>
  <text x="650" y="296" fill="#64748B" font-size="10">严重级别：CRITICAL > HIGH > MEDIUM > LOW</text>

  <!-- Performance Issues -->
  <rect x="620" y="325" width="460" height="110" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="650" y="355" fill="#FBBF24" font-size="13" font-weight="700"> 性能审查</text>

  <rect x="650" y="370" width="100" height="48" rx="8" fill="#1A2F3D" stroke="#06B6D4" stroke-width="1"/>
  <text x="700" y="390" fill="#22D3EE" font-size="11" font-weight="600" text-anchor="middle">数据库</text>
  <text x="700" y="407" fill="#94A3B8" font-size="9" text-anchor="middle">慢查询/索引</text>

  <rect x="765" y="370" width="100" height="48" rx="8" fill="#1A2F3D" stroke="#06B6D4" stroke-width="1"/>
  <text x="815" y="390" fill="#22D3EE" font-size="11" font-weight="600" text-anchor="middle">API</text>
  <text x="815" y="407" fill="#94A3B8" font-size="9" text-anchor="middle">响应时间/并发</text>

  <rect x="880" y="370" width="100" height="48" rx="8" fill="#1A2F3D" stroke="#06B6D4" stroke-width="1"/>
  <text x="930" y="390" fill="#22D3EE" font-size="11" font-weight="600" text-anchor="middle">前端</text>
  <text x="930" y="407" fill="#94A3B8" font-size="9" text-anchor="middle">加载/渲染</text>

  <rect x="995" y="370" width="68" height="48" rx="8" fill="#1A2F3D" stroke="#06B6D4" stroke-width="1"/>
  <text x="1029" y="390" fill="#22D3EE" font-size="11" font-weight="600" text-anchor="middle">基础设施</text>
  <text x="1029" y="407" fill="#94A3B8" font-size="8" text-anchor="middle">扩容/资源</text>

  <!-- Architecture Issues -->
  <rect x="620" y="450" width="460" height="100" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="650" y="480" fill="#A78BFA" font-size="13" font-weight="700"> 架构审查</text>

  <rect x="650" y="495" width="130" height="38" rx="6" fill="#2A1F3D" stroke="#8B5CF6" stroke-width="1"/>
  <text x="715" y="519" fill="#A78BFA" font-size="11" text-anchor="middle">可扩展性</text>

  <rect x="795" y="495" width="130" height="38" rx="6" fill="#2A1F3D" stroke="#8B5CF6" stroke-width="1"/>
  <text x="860" y="519" fill="#A78BFA" font-size="11" text-anchor="middle">可维护性</text>

  <rect x="940" y="495" width="130" height="38" rx="6" fill="#2A1F3D" stroke="#8B5CF6" stroke-width="1"/>
  <text x="1005" y="519" fill="#A78BFA" font-size="11" text-anchor="middle">可靠性</text>

  <!-- ===== Three governance strategies ===== -->
  <text x="600" y="610" fill="#E2E8F0" font-size="16" font-weight="600" text-anchor="middle">三大治理策略对比</text>

  <rect x="80" y="635" width="320" height="120" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
  <text x="240" y="665" fill="#34D399" font-size="15" font-weight="700" text-anchor="middle">Default（默认）</text>
  <text x="240" y="688" fill="#CBD5E1" font-size="11" text-anchor="middle">质量门槛：90 分</text>
  <text x="240" y="706" fill="#CBD5E1" font-size="11" text-anchor="middle">红队审查：必须通过</text>
  <text x="240" y="724" fill="#94A3B8" font-size="10" text-anchor="middle">适用场景：大多数项目</text>
  <rect x="88" y="738" width="56" height="10" rx="5" fill="#10B981"/>

  <rect x="440" y="635" width="320" height="120" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="600" y="665" fill="#FBBF24" font-size="15" font-weight="700" text-anchor="middle">Balanced（均衡）</text>
  <text x="600" y="688" fill="#CBD5E1" font-size="11" text-anchor="middle">质量门槛：略低</text>
  <text x="600" y="706" fill="#CBD5E1" font-size="11" text-anchor="middle">红队审查：可选</text>
  <text x="600" y="724" fill="#94A3B8" font-size="10" text-anchor="middle">适用场景：快速原型 / MVP</text>
  <rect x="448" y="738" width="40" height="10" rx="5" fill="#F59E0B"/>

  <rect x="800" y="635" width="320" height="120" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="2"/>
  <text x="960" y="665" fill="#F87171" font-size="15" font-weight="700" text-anchor="middle">Enterprise（企业）</text>
  <text x="960" y="688" fill="#CBD5E1" font-size="11" text-anchor="middle">质量门槛：更高</text>
  <text x="960" y="706" fill="#CBD5E1" font-size="11" text-anchor="middle">红队审查：强制 + 加强</text>
  <text x="960" y="724" fill="#94A3B8" font-size="10" text-anchor="middle">适用场景：金融、医疗等合规行业</text>
  <rect x="808" y="738" width="72" height="10" rx="5" fill="#EF4444"/>

  <text x="600" y="790" fill="#334155" font-size="10" text-anchor="middle">Super Dev v2.2.0 · 质量保障体系图</text>
</svg>
</body>
</html>
